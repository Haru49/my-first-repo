<!DOCTYPE html>
<html>
    <head>
        <style>
            .box {
                width: auto;
                height: auto;
                background-color:rgb(76, 175, 203);
            }
            .talk_1 {
                display: inline-block;
                border-radius: 6px;
                padding: 10px;
                margin: 10px;
                background-color:gray;
            }
            .talk_2 {
                display: inline-block;
                border-radius: 6px;
                padding: 10px;
                margin: 10px;
                background-color:greenyellow;
            }
            .box p {
                font-weight: bold;
            }
        </style>
    </head>
    <body class = "box">
        <div>
            <p>教員：<span class = "talk_1">今日は display プロパティを学びます。</span></p>
            <p>学生：<span class = "talk_2">inlineとかboxの話ですか？</span></p>
            <p>教員：<span class = "talk_1">そうです。このプロパティは変えられます。</span></p>
            <p>学生：<span class = "talk_2">本当ですか？</span></p>
        </div>
    </body>
</html>
