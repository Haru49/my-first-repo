<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロフィールカード作成</title>

  <style>
    body {
      margin: 0;
      background-color: #1c1c1c;
      font-family: sans-serif;
    }

    .area {
      width: 640px;
      min-height: 700px;
      background-color: #f1f2f5;
      margin: 40px auto;
      padding: 40px 0;
    }

    .form-card,
    .profile-card {
      width: 500px;
      background-color: white;
      margin: 0 auto 32px auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    input {
      width: 100%;
      height: 58px;
      box-sizing: border-box;
      margin-bottom: 16px;
      padding: 0 16px;
      font-size: 24px;
      font-weight: bold;
      border: 2px solid #d0d0d0;
      border-radius: 12px;
      outline: none;
    }

    input::placeholder {
      color: #888;
    }

    button {
      width: 100%;
      height: 68px;
      background-color: #4caf50;
      color: white;
      font-size: 26px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .profile-card {
      text-align: center;
      color: #333;
    }

    .profile-card h1 {
      margin: 0 0 20px 0;
      font-size: 40px;
    }

    .profile-card p {
      margin: 12px 0;
      font-size: 24px;
      font-weight: bold;
      color: #555;
    }
  </style>
</head>

<body>
  <div class="area">

    <form id="form-card" class="form-card">
      <input type="text" name="name" placeholder="名前を入力">
      <input type="text" name="age" placeholder="年齢を入力">
      <input type="text" name="hobby" placeholder="趣味を入力">

      <button>カードを作成</button>
    </form>

    <div id="card-list"></div>
  </div>
</body>
<script>
  const form = document.getElementById("form-card");
  const cardList = document.getElementById("card-list");

  form.addEventListener("submit", function(event) {
    event.preventDefault(); // デフォルトの送信を止める
    const name = form.elements["name"].value;
    const age = form.elements["age"].value;
    const hobby = form.elements["hobby"].value;

    const card = document.createElement("div");
    card.classList.add("profile-card");

    card.innerHTML = `
      <h1>${name}</h1>
      <p>年齢：${age}</p>
      <p>趣味：${hobby}</p>
    `;

    cardList.appendChild(card);
    
    //フォームをリセット
    form.reset();
  });
</script>
</html>
