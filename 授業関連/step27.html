<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #1c1c1c;
            font-family: sans-serif;
        }

        .container {
            width: 560px;
            height: 520px;
            background-color: #f7f7f7;
            margin: 20px;
            border-radius: 4px;
            padding-top: 45px;
        }

        .add-button {
            display: block;
            margin: 0 auto 55px auto;
            width: 110px;
            height: 65px;
            background-color: #5146e8;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
        }

        .item {
            width: 450px;
            height: 75px;
            background-color: white;
            margin: 15px auto;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            font-size: 26px;
        }

        .delete-button {
            width: 75px;
            height: 50px;
            background-color: #ef4444;
            color: white;
            font-size: 22px;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="add-button">追加</button>
    </div>
    <script>
        const addButton = document.querySelector('.add-button');
        const container = document.querySelector('.container');

        let count = 1;

        // 追加ボタンを押したとき
        addButton.addEventListener('click', () => {
            // itemを作る
            const item = document.createElement('div');
            item.className = 'item';
            // 文字を作る
            const span = document.createElement('span');
            span.textContent = 'アイテム' + count;
            // 削除ボタンを作る
            const deleteButton = document.createElement('button');
            deleteButton.className = 'delete-button';
            deleteButton.textContent = '削除';
            // 新しく作った削除ボタンにイベントを付ける
            deleteButton.addEventListener('click', () => {
                item.remove();
            });

            // itemの中に文字とボタンを入れる
            item.appendChild(span);
            item.appendChild(deleteButton);

            // containerに追加する
            container.appendChild(item);
            count++;
        });
    </script>

</body>
</html>
