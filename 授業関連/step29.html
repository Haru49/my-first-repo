<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
    </head>
    <body>
        <input type="text" id="inputText">
        <p>残りの文字数 <span id="Text">100</span></p>
        <script>
            const inputText = document.getElementById('inputText');
            const text = document.getElementById('Text');

            inputText.addEventListener('input', () => {
                text.textContent = 100 - inputText.value.length;
            });
        </script>
    </body>
</html>
