<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>XSS対策</title>

        <style>

        </style>
    </head>
    <body>
        <h2>プロフィール登録（XSS対策あり）</h2>

        <label for="nickname">ニックネーム：</label>
        <input type="text" id="nickname" placeholder="例：さくら">

        <label for="bio">自己紹介：</label>
        <textarea id="bio" rows="4" placeholder="例：こんにちは！<b>よろしく</b>お願いします！"></textarea>

        <button onclick="showProfile()">表示</button>

        <div id="profile">
        <p id="nameArea"></p>
        <p id="bioArea"></p>
        </div>
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
        <script>
            function showProfile() {
                var name = document.getElementById("nickname").value;
                var bio = document.getElementById("bio").value;

                document.getElementById("nameArea").textContent = name;

                const bioclean = DOMPurify.sanitize(bio, { ALLOWED_TAGS: ['b', 'i'] });
                document.getElementById("bioArea").innerHTML = bioclean;
            }
        </script>
    </body>
</html>
