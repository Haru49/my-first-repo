<!DOCTYPE html>
<html>
    <head>
        <style>
            .layout {
                display: flex;
                flex-wrap: wrap;
                width: 455px;
            }
            .box {
                color: black;
                font-size: 13px;
                border: 0.1px solid black;
            }
            .box1 {
                background-color: rgb(144, 255, 238);
                width: 150px;
                height: 150px;
            }
            .box2 {
                background-color: rgb(248, 255, 107);
                width: 150px;
                height: 150px;
            }
            .box3 {
                background-color: rgb(243, 101, 191);
                width: 150px;
                height: 150px;
            }
            .box4 {         
                background-color: rgb(122, 222, 255);
                width: 450px;
                height: 150px;
            }
            .box5 {
                background-color: rgb(131, 255, 158);
                width: 225px;
                height: 150px;
            }
            .box6 {
                background-color: rgb(255, 183, 119);
                width: 225px;
                height: 150px;
            }
        </style>
    </head>
    <body>
        <div class="layout">
            <div class="box box1">1</div>
            <div class="box box2">2</div>
            <div class="box box3">3</div>
            <div class="box box4">4</div>
            <div class="box box5">5</div>
            <div class="box box6">6</div>
        </div>
    </body>
</html>
