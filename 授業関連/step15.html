<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
        background-color:white;
        color: black;
        margin: 0;
        padding: 0;
    }
    h1 {
        font-size: 20px;
        font-weight: normal;
        padding: 0;
        margin: 0;
    }
    p {
        font-size: 16px;
        line-height: 1.5;
        padding: 0;
        margin: 0;
    }
    ul, ol {

        padding: 0;
        margin: 0;
    }

        text-decoration: none;
        color: black;
    }

</head>
<body>
  <h1>これは見出しです</h1>
  <p>これは段落テキストです。</p>
  <ul>
    <li>りんご</li>
    <li>みかん</li>
  </ul>
  <a href="#">リンクはこちら</a>
</body>
</html>
