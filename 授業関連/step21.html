<!DOCTYPE html>
<html>
    <head>
        <style>
            .container {
                display: flex;
                gap: 10px;
                }

            .box {
                background-color: aliceblue;
                border: 2px solid black;
                border-radius: 10px;
                padding: 20px;
                width: 350px;
                height: 450px;
            }

            .picture {
                background-color: gray;
                padding-top:5px;
                margin: auto;
                width: 300px;
                height: 180px;
            }
            
            h2 {
                text-align: center;
            }

            button {
                background-color:rgb(2, 142, 229);
                color: white;
                font-size: 16px;
                font-weight: bold;;
                border-radius: 4px;
                border: 1px solid black;

                width: 100px;
                height: 60px;
            }

            /* レスポンシブ対応：画面幅600px以下なら縦に並べる */
            @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }
            }
            @media (min-width: 601px) and (max-width: 900px) {
            .container {
                flex-wrap: wrap;
                
            }
            }

            @media (min-width: 901px) {
            .container {
                    flex-direction: row;
            }
            }
        </style>
    </head>
    <body>
        <div class="container">
        <div class="box">
            <div class="picture"></div>

            <h2>ラーメン</h2>
            <p>ここのラーメンは美味しい<br>すっごく美味しい</p>

            <button type="submit">ここにする</button>
        </div>
        <div class="box">
            <div class="picture"></div>

            <h2>たこ焼き</h2>
            <p>ここのラーメンは美味しい<br>すっごく美味しい</p>

            <button type="submit">ここにする</button>
        </div>
        <div class="box">
            <div class="picture"></div>

            <h2>すし</h2>
            <p>ここのラーメンは美味しい<br>すっごく美味しい</p>

            <button type="submit">ここにする</button>
        </div>
        </div>
    </body>
</html>
