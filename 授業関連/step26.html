<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        .traffic-light {
            width: 600px;
            height: 200px;
            background-color: #bcc8d5;
            border-radius: 100px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: #7d8794;
        }
        .blue {
            background-color: skyblue;
        }

        .yellow {
            background-color: yellow;
        }

        .red {
            background-color: #ef1f2f;
        }
    </style>
</head>
<body>
    <div class="traffic-light">
        <div class="circle blue"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    <div>
        <button id="myButton">0</button>
    </div>

    <script>
    const B_bt = document.getElementById("myButton");
    const circles = document.querySelectorAll(".circle");

    let index = 1;
    let count = 0;

    B_bt.addEventListener("click", function () {
        count++;
        B_bt.textContent = count;

        circles[0].className = "circle";
        circles[1].className = "circle";
        circles[2].className = "circle";

        if (index === 0) {
            circles[0].classList.add("blue");
        } else if (index === 1) {
            circles[1].classList.add("yellow");
        } else {
            circles[2].classList.add("red");
        }
        index++;
        if (index > 2) {
            index = 0;
        }
    });
</script>
</body>
</html>
